<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Smart Calculator</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h2>SmartCalc AI</h2>
        <button onclick="toggleDark()">🌙</button>
    </div>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button onclick="clearDisplay()">AC</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button class="op" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="op" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="op" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="op" onclick="append('+')">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
        <button onclick="speakResult()">🔊</button>

        <!-- Scientific -->
        <button onclick="func('sin')">sin</button>
        <button onclick="func('cos')">cos</button>
        <button onclick="func('tan')">tan</button>
        <button onclick="func('log')">log</button>

        <button onclick="square()">x²</button>
        <button onclick="sqrt()">√</button>
        <button onclick="factorial()">x!</button>
        <button onclick="append(Math.PI)">π</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
